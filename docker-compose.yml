version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: inmarco-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=inmarco
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-inmarco_secure_password_2024}
      - POSTGRES_DB=inmarco_website
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - inmarco-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inmarco -d inmarco_website"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Next.js Application
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    image: inmarco-website:latest
    container_name: inmarco-nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      - DATABASE_URL=postgresql://inmarco:${POSTGRES_PASSWORD:-inmarco_secure_password_2024}@postgres:5432/inmarco_website?schema=public
    volumes:
      # Mount public directory for serving static files
      - ./public:/app/public:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inmarco-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: inmarco-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./public:/usr/share/nginx/html/public:ro
    depends_on:
      - nextjs
    networks:
      - inmarco-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  inmarco-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
