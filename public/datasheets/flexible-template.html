<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Inmarco Datasheet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @page {
            size: A4;
            margin: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            color: #2b2a29;
            background: white;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
        }

        /* ==================== SINGLE PAGE LAYOUT ==================== */
        .single-page-layout {
            width: 100%;
            min-height: 297mm;
            padding: 15mm 20mm;
        }

        .sp-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10mm;
            padding-bottom: 5mm;
            border-bottom: 2px solid #e31e24;
        }

        .sp-logo img {
            height: 50px;
            width: auto;
        }

        .sp-cert {
            text-align: right;
        }

        .sp-tagline {
            font-size: 9pt;
            color: #666;
            font-style: italic;
        }

        .sp-tech-label {
            background: #e31e24;
            color: white;
            padding: 3mm 8mm;
            font-size: 12pt;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 8mm;
        }

        .sp-title {
            text-align: center;
            margin-bottom: 8mm;
        }

        .sp-subtitle {
            font-size: 14pt;
            color: #333;
            margin-bottom: 2mm;
        }

        .sp-product-name {
            font-size: 22pt;
            font-weight: bold;
            color: #e31e24;
        }

        .sp-section {
            margin-bottom: 8mm;
        }

        .sp-section-header {
            background: #5d4e37;
            color: white;
            padding: 2mm 4mm;
            font-size: 11pt;
            font-weight: 600;
            margin-bottom: 3mm;
        }

        .sp-section-content {
            font-size: 10pt;
            line-height: 1.6;
            color: #333;
            text-align: justify;
        }

        .sp-table {
            width: 100%;
            border-collapse: collapse;
            margin: 3mm 0;
        }

        .sp-table th {
            background: #ffd700;
            border: 2px solid #000;
            padding: 2mm 4mm;
            text-align: left;
            font-size: 10pt;
            font-weight: bold;
        }

        .sp-table td {
            border: 2px solid #000;
            padding: 2mm 4mm;
            font-size: 10pt;
        }

        .sp-table td:first-child {
            background: #ffd700;
            font-weight: 600;
        }

        .sp-bullet-list {
            list-style: none;
            padding: 0;
        }

        .sp-bullet-list li {
            position: relative;
            padding-left: 6mm;
            margin-bottom: 2mm;
            font-size: 10pt;
            line-height: 1.5;
        }

        .sp-bullet-list li:before {
            content: "❖";
            position: absolute;
            left: 0;
            color: #333;
        }

        .sp-footer {
            margin-top: 10mm;
            padding-top: 5mm;
            border-top: 2px solid #ccc;
            font-size: 7pt;
            line-height: 1.6;
        }

        .sp-company-name {
            font-size: 11pt;
            font-weight: bold;
            margin-bottom: 2mm;
        }

        .sp-disclaimer {
            margin-top: 5mm;
            font-size: 6pt;
            color: #666;
            text-align: justify;
        }

        /* ==================== MULTI-PAGE LAYOUT (3 pages) ==================== */
        .multi-page-layout .page {
            page-break-after: always;
        }

        .multi-page-layout .page:last-child {
            page-break-after: auto;
        }

        /* Page 1 - Hero */
        .page-1 {
            width: 100%;
            height: 290mm;
            background: linear-gradient(135deg, #2b2a29 0%, #1a1918 100%);
            position: relative;
            overflow: hidden;
        }

        .mp-header {
            padding: 20mm 15mm;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mp-logo img {
            height: 200px;
            width: auto;
        }

        .mp-version {
            font-size: 8pt;
            color: #888;
            position: absolute;
            top: 20mm;
            right: 15mm;
        }

        .hero-section {
            position: relative;
            margin-top: 10px;
            height: calc(100% - 100px);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(43, 42, 41, 0.95) 0%, rgba(43, 42, 41, 0.7) 50%, transparent 100%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            padding: 35mm 15mm 0 15mm;
            max-width: 150mm;
        }

        .red-accent {
            width: 50mm;
            height: 4px;
            background: #e31e24;
            margin-bottom: 10mm;
        }

        .product-name {
            font-size: 52pt;
            font-weight: 700;
            color: white;
            margin-bottom: 6mm;
            letter-spacing: -1.5px;
            line-height: 1.1;
        }

        .product-tagline {
            font-size: 16pt;
            color: #ffffff;
            max-width: 140mm;
            line-height: 1.5;
            font-weight: 300;
        }

        /* Page 2 */
        .page-2 {
            width: 100%;
            min-height: 290mm;
            background: white;
            position: relative;
        }

        .mp-page-header {
            background: linear-gradient(135deg, #2b2a29 0%, #1a1918 100%);
            padding: 15mm;
            color: white;
        }

        .mp-page-title {
            font-size: 28pt;
            font-weight: bold;
        }

        .mp-content-section {
            padding: 12mm 15mm;
        }

        .mp-section {
            margin-bottom: 8mm;
        }

        .mp-section-title {
            font-size: 13pt;
            color: #2b2a29;
            margin-bottom: 5mm;
            padding-bottom: 2mm;
            border-bottom: 2px solid #e31e24;
            font-weight: 600;
        }

        .mp-description {
            font-size: 10pt;
            line-height: 1.6;
            color: #333;
            margin-bottom: 8mm;
            text-align: justify;
        }

        .mp-section-divider {
            height: 2px;
            background: linear-gradient(to right, #e31e24 0%, transparent 100%);
            margin: 8mm 0;
        }

        .mp-properties-section {
            background: #f5f5f5;
            padding: 8mm;
            border-radius: 3mm;
            border-left: 4px solid #e31e24;
            margin-bottom: 8mm;
        }

        .mp-properties-table {
            width: 100%;
            border-collapse: collapse;
        }

        .mp-properties-table th {
            background: #2b2a29;
            color: white;
            padding: 3mm;
            text-align: left;
            font-size: 9pt;
            font-weight: 600;
        }

        .mp-properties-table td {
            padding: 2.5mm 3mm;
            border-bottom: 1px solid #ddd;
            font-size: 9pt;
            color: #333;
        }

        .mp-properties-table tr:last-child td {
            border-bottom: none;
        }

        .mp-properties-table td:first-child {
            font-weight: 600;
            color: #2b2a29;
        }

        .mp-bullet-list {
            list-style: none;
            padding: 0;
        }

        .mp-bullet-list li {
            display: flex;
            margin-bottom: 4mm;
            font-size: 9pt;
            line-height: 1.5;
        }

        .mp-bullet {
            color: #e31e24;
            font-weight: bold;
            margin-right: 3mm;
            font-size: 12pt;
        }

        .mp-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #2b2a29;
            color: white;
            padding: 8mm 15mm;
        }

        .mp-company-name {
            font-size: 10pt;
            font-weight: bold;
            margin-bottom: 2mm;
            color: #e31e24;
        }

        .mp-contact-info {
            font-size: 7pt;
            line-height: 1.6;
            color: #ccc;
        }

        .mp-disclaimer {
            font-size: 6pt;
            color: #888;
            margin-top: 3mm;
        }

        /* Common utilities */
        .text-center {
            text-align: center;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="datasheet-container">
        <!-- Content will be dynamically inserted here -->
    </div>

    <script>
        // Function to load and populate datasheet
        async function loadDatasheet(dataFile) {
            try {
                const response = await fetch(dataFile);
                const data = await response.json();
                populateDatasheet(data);
            } catch (error) {
                console.error('Error loading datasheet data:', error);
                document.getElementById('datasheet-container').innerHTML =
                    '<div style="padding: 20mm; text-align: center;"><h2>Error loading datasheet</h2><p>' + error.message + '</p></div>';
            }
        }

        function populateDatasheet(data) {
            const container = document.getElementById('datasheet-container');

            if (data.layout === 'single-page') {
                container.innerHTML = generateSinglePageLayout(data);
            } else {
                container.innerHTML = generateMultiPageLayout(data);
            }

            // Set page title
            document.getElementById('page-title').textContent =
                `${data.productInfo.styleName} - Technical Datasheet`;
        }

        function generateSinglePageLayout(data) {
            let html = '<div class="single-page-layout">';

            // Header
            html += `
                <div class="sp-header">
                    <div class="sp-logo">
                        <img src="${data.images.logo || '../../src/assets/inmarco-logo.png'}" alt="INMARCO">
                        <div class="sp-tagline">Innovations in Fluid Sealing</div>
                    </div>
                    ${data.images.cert ? `<div class="sp-cert"><img src="${data.images.cert}" alt="Certification"></div>` : ''}
                </div>

                <div class="sp-tech-label">TECHNICAL DATA SHEET</div>

                <div class="sp-title">
                    <div class="sp-subtitle">${data.productInfo.fullTitle || ''}</div>
                    <div class="sp-product-name">${data.productInfo.styleName}</div>
                </div>
            `;

            // Sections
            data.sections.forEach(section => {
                html += '<div class="sp-section">';
                html += `<div class="sp-section-header">${section.title}:</div>`;

                if (section.type === 'description') {
                    html += '<div class="sp-section-content">';
                    section.content.forEach(para => {
                        html += `<p style="margin-bottom: 3mm;">${para}</p>`;
                    });
                    html += '</div>';
                }
                else if (section.type === 'technical-properties') {
                    html += '<table class="sp-table">';
                    html += '<tr><th>PROPERTIES</th><th>VALUES</th></tr>';
                    section.properties.forEach(prop => {
                        html += `<tr><td>${prop.name}</td><td>${prop.value}</td></tr>`;
                    });
                    html += '</table>';
                }
                else if (section.type === 'bullet-list') {
                    html += '<ul class="sp-bullet-list">';
                    section.items.forEach(item => {
                        html += `<li>${item}</li>`;
                    });
                    html += '</ul>';
                }
                else if (section.type === 'text-block') {
                    html += `<div class="sp-section-content">${section.content}</div>`;
                }

                html += '</div>';
            });

            // Footer
            html += `
                <div class="sp-footer">
                    <div class="sp-company-name">${data.company.name}</div>
                    <div>${data.company.address}<br>
                    Tel. No.: ${data.company.phone} Fax No.: ${data.company.fax}<br>
                    Email: ${data.company.email} Web.: ${data.company.website}</div>
                    <div class="sp-disclaimer">${data.company.disclaimer}</div>
                </div>
            `;

            html += '</div>';
            return html;
        }

        function generateMultiPageLayout(data) {
            let html = '<div class="multi-page-layout">';

            // Page 1 - Hero
            html += `
                <div class="page page-1">
                    <div class="mp-header">
                        <div class="mp-logo">
                            <img src="${data.images.logo || '../../src/assets/inmarco-tagline-logo1.png'}" alt="INMARCO">
                        </div>
                    </div>
                    <div class="mp-version">${data.productInfo.version || 'V 01'}</div>
                    <div class="hero-section" style="background-image: url('${data.images.hero}');">
                        <div class="hero-overlay"></div>
                        <div class="hero-content">
                            <div class="red-accent"></div>
                            <h1 class="product-name">${data.productInfo.styleName}</h1>
                            <p class="product-tagline">${data.productInfo.tagline || ''}</p>
                        </div>
                    </div>
                </div>
            `;

            // Page 2 and beyond
            html += `<div class="page page-2">
                <div class="mp-page-header">
                    <div style="font-size: 11pt; color: #e31e24; margin-bottom: 3mm;">TECHNICAL DATASHEET</div>
                    <h2 class="mp-page-title">${data.productInfo.fullName || data.productInfo.styleName}</h2>
                </div>
                <div class="mp-content-section">`;

            // Render sections
            data.sections.forEach(section => {
                html += '<div class="mp-section">';
                html += `<h3 class="mp-section-title">${section.title}</h3>`;

                if (section.type === 'description') {
                    section.content.forEach(para => {
                        html += `<p class="mp-description">${para}</p>`;
                    });
                }
                else if (section.type === 'technical-properties') {
                    html += '<div class="mp-properties-section">';
                    html += generatePropertiesTable(section);
                    html += '</div>';
                }
                else if (section.type === 'bullet-list') {
                    html += '<ul class="mp-bullet-list">';
                    section.items.forEach(item => {
                        html += `<li><span class="mp-bullet">●</span><span>${item}</span></li>`;
                    });
                    html += '</ul>';
                }
                else if (section.type === 'text-block') {
                    html += `<p class="mp-description">${section.content}</p>`;
                }

                html += '</div>';
            });

            html += `</div>
                <div class="mp-footer">
                    <div class="mp-company-name">${data.company.name}</div>
                    <div class="mp-contact-info">
                        ${data.company.address}<br>
                        Tel: ${data.company.phone} | Fax: ${data.company.fax}<br>
                        Email: ${data.company.email} | Web: ${data.company.website}
                    </div>
                    <div class="mp-disclaimer">${data.company.disclaimer}</div>
                </div>
            </div>`;

            html += '</div>';
            return html;
        }

        function generatePropertiesTable(section) {
            let html = '<table class="mp-properties-table">';

            if (section.hasEquipmentTypes) {
                // Equipment-specific table
                html += `<tr>
                    <th>Properties</th>
                    <th style="text-align: center;">
                        <i class="fas fa-sync-alt" style="font-size: 14pt;"></i>
                        <br><span style="font-size: 7pt; font-weight: normal;">Rotating</span>
                    </th>
                    <th style="text-align: center;">
                        <i class="fas fa-arrows-alt-h" style="font-size: 14pt;"></i>
                        <br><span style="font-size: 7pt; font-weight: normal;">Reciprocating</span>
                    </th>
                    <th style="text-align: center;">
                        <i class="fas fa-circle" style="font-size: 14pt;"></i>
                        <br><span style="font-size: 7pt; font-weight: normal;">Static</span>
                    </th>
                </tr>`;

                section.properties.forEach(prop => {
                    if (prop.type === 'universal') {
                        html += `<tr>
                            <td>${prop.name}</td>
                            <td colspan="3" style="text-align: center;">${prop.value}</td>
                        </tr>`;
                    } else {
                        html += `<tr>
                            <td>${prop.name}</td>
                            <td style="text-align: center;">${prop.values.rotating}</td>
                            <td style="text-align: center;">${prop.values.reciprocating}</td>
                            <td style="text-align: center;">${prop.values.static}</td>
                        </tr>`;
                    }
                });
            } else {
                // Simple table
                html += '<tr><th>Property</th><th>Value</th></tr>';
                section.properties.forEach(prop => {
                    html += `<tr><td>${prop.name}</td><td>${prop.value}</td></tr>`;
                });
            }

            html += '</table>';
            return html;
        }

        // Get data file from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const dataFile = urlParams.get('data') || 'data/HY_105_data.json';
        loadDatasheet(dataFile);
    </script>
</body>
</html>
